<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AnimeTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <header class="topbar">
        <div class="logo">AnimeTube</div>
        <div class="search">
            <input type="text" placeholder="جست‌وجوی انیمه، اوپنینگ، موزیک...">
        </div>
        <button id="themeToggle">🌙</button>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul>
                <li>خانه</li>
                <li>انیمه‌ها</li>
                <li>موزیک‌ها</li>
                <li>پلی‌لیست‌ها</li>
            </ul>
        </aside>

        <main class="content">
            <div class="video-grid">
                <div class="video-card">
                    <img src="https://i.imgur.com/2DhmtJ4.jpg">
                    <h3>Attack on Titan Opening</h3>
                    <p>کانال: Anime OST</p>
                </div>

                <div class="video-card">
                    <img src="https://i.imgur.com/8Km9tLL.jpg">
                    <h3>Demon Slayer OST</h3>
                    <p>کانال: Anime Music</p>
                </div>

                <div class="video-card">
                    <img src="https://i.imgur.com/1Jm0pZb.jpg">
                    <h3>Jujutsu Kaisen Ending</h3>
                    <p>کانال: Anime Endings</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
