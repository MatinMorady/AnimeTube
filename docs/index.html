<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YouTube Mobile Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- هدر شبیه یوتیوب موبایل -->
    <header class="yt-header">
        <div class="yt-header-left">
            <div class="yt-logo">YouTube</div>
        </div>
        <div class="yt-header-right">
            <button class="yt-icon-btn">🔍</button>
            <button class="yt-icon-btn">⋮</button>
        </div>
    </header>

    <!-- محتوای اصلی: لیست ویدیوها -->
    <main class="yt-content">
        <section class="yt-video-list">

            <article class="yt-video-card">
                <div class="yt-thumbnail"></div>
                <div class="yt-video-info">
                    <h3 class="yt-video-title">Attack on Titan Opening</h3>
                    <p class="yt-video-meta">AnimeTube • 120K views • 2 days ago</p>
                </div>
            </article>

            <article class="yt-video-card">
                <div class="yt-thumbnail"></div>
                <div class="yt-video-info">
                    <h3 class="yt-video-title">Demon Slayer OST</h3>
                    <p class="yt-video-meta">AnimeTube • 95K views • 1 week ago</p>
                </div>
            </article>

            <article class="yt-video-card">
                <div class="yt-thumbnail"></div>
                <div class="yt-video-info">
                    <h3 class="yt-video-title">Jujutsu Kaisen Ending</h3>
                    <p class="yt-video-meta">AnimeTube • 150K views • 3 days ago</p>
                </div>
            </article>

        </section>
    </main>

    <!-- نوار پایین شبیه یوتیوب موبایل -->
    <nav class="yt-bottom-nav">
        <button class="yt-bottom-item yt-bottom-active">خانه</button>
        <button class="yt-bottom-item">شورت‌ها</button>
        <button class="yt-bottom-item">اشتراک‌ها</button>
        <button class="yt-bottom-item">کتابخانه</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
