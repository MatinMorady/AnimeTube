<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AnimeTube</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- هدر شبیه یوتیوب -->
    <header class="yt-header">
        <div class="yt-left">
            <div class="yt-logo">AnimeTube</div>
        </div>

        <div class="yt-center">
            <input type="text" class="yt-search-input" placeholder="جست‌وجوی انیمه، موزیک، OST...">
            <button class="yt-search-btn">Search</button>
        </div>

        <div class="yt-right">
            <div class="yt-avatar">M</div>
        </div>
    </header>

    <!-- ساختار اصلی صفحه -->
    <div class="yt-layout">

        <!-- سایدبار -->
        <aside class="yt-sidebar">
            <div class="yt-sidebar-item">خانه</div>
            <div class="yt-sidebar-item">انیمه‌ها</div>
            <div class="yt-sidebar-item">موزیک‌ها</div>
            <div class="yt-sidebar-item">پلی‌لیست‌ها</div>
            <div class="yt-sidebar-item">محبوب‌ها</div>
        </aside>

        <!-- محتوای اصلی -->
        <main class="yt-content">

            <section class="yt-videos-grid">

                <article class="yt-video-card">
                    <img src="https://i.imgur.com/2DhmtJ4.jpg" alt="Attack on Titan">
                    <h3>Attack on Titan Opening</h3>
                    <p>Anime OST • 120K views • 1 day ago</p>
                </article>

                <article class="yt-video-card">
                    <img src="https://i.imgur.com/8Km9tLL.jpg" alt="Demon Slayer OST">
                    <h3>Demon Slayer OST</h3>
                    <p>Anime Music • 95K views • 3 days ago</p>
                </article>

                <article class="yt-video-card">
                    <img src="https://i.imgur.com/1Jm0pZb.jpg" alt="Jujutsu Kaisen Ending">
                    <h3>Jujutsu Kaisen Ending</h3>
                    <p>Anime Endings • 150K views • 1 week ago</p>
                </article>

            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
